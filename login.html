<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>
        Login
    </title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css' rel='stylesheet'
        integrity='sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB' crossorigin='anonymous'>
    <link href='https://fonts.cdnfonts.com/css/open-sans' rel='stylesheet'>
    <link href='https://fonts.cdnfonts.com/css/oswald-4' rel='stylesheet'>
    <style>
        body{
background-color: #f9f9f9;
        }
        .main-container {
            margin: 0 auto;
        }

        .left {
            /* background: linear-gradient(to bottom, #6F00FF, #7947BB); */
            background-image: url(img/login/left-backgrpound.png);
            background-position: bottom;
            background-repeat: no-repeat;
            background-size: 95%;
            color: white;
            height: 100vh;
        }


        .left .container {
            padding: 20px;
        }
        .right .container{
height:100vh;
            padding:20px;
        }
    </style>
</head>

<body>

    <div class="main-container container">
        <div class="row">
            <div class=" left col-lg-6 col-md-6 col-sm-12">
                <div class="container">
                    <div class="px-4">
                        <img src="img/login/logo.png" alt="" width="150px">
                    </div>
                    <div class="px-4 py-3">
                        <img src="img/login/user-add.png" alt="">
                        <h3 class="pt-2" style="font-size: 22px;">Sign Up and Come On in.</h3>
                        <p style="font-size: 14px;">Sign in is simple, free & fast and discover your role fit for you.
                        </p>
                    </div>
                </div>
            </div>
            <div class="right col-lg-6 col-md-6 col-sm-12">
                <div class="container border">
                    <div class="text-end">
                        <p>Already have an account, are you a faculty? <a href="#" >Log In</a></p>
                    </div>
                    <div class="d-flex justify-content-center" style="margin:30% auto">
                        <div class="text-center"> 
                            <h3 class="mb-3">Enter your details to Sign Up</h3>
                            <div class="p-5 border class="text-center" style="width:75%; border-radius:30px; margin:30px auto">
                                <form action="index.html">
                                    <input type="text" placeholder="Enter Your Mobile Number" required class="form-control mb-3" />
                                    <input type="password" placeholder="Enter Your Password" required class="form-control mb-3" />
                                    <input type="password" placeholder="Confirm Your Password" required class="form-control mb-3" />
                                    <button type="submit" class="btn btn-success w-100">Sign Up</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
